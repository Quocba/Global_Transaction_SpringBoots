version: '3.8'

services:
  seata-server:
    image: seataio/seata-server:1.8.0
    container_name: demo-seata-server
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - STORE_MODE=redis
      - SEATA_STORE_REDIS_HOST=localhost
      - SEATA_STORE_REDIS_PORT=6379
      - SEATA_STORE_REDIS_PASSWORD=
      - SEATA_STORE_REDIS_DATABASE=0
